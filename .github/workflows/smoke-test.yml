name: Production Smoke Test

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  schedule:
    # Daily at 7 AM UTC, after overnight data refresh
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  smoke:
    name: riskmodels.app Health
    runs-on: ubuntu-latest

    steps:
      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://riskmodels.app/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ /api/health returned $STATUS"
            exit 1
          fi
          echo "✅ /api/health → $STATUS"

      - name: OpenAPI spec accessible
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://riskmodels.app/openapi.json)
          if [ "$STATUS" != "200" ]; then
            echo "❌ /openapi.json returned $STATUS"
            exit 1
          fi
          echo "✅ /openapi.json → $STATUS"

      - name: Unauthenticated endpoints return 401
        run: |
          # /api/tickers is intentionally public (landing-page search) — excluded here
          for ENDPOINT in \
            "/api/estimate" \
            "/api/balance" \
            "/api/l3-decomposition" \
            "/api/metrics/AAPL"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://riskmodels.app${ENDPOINT}")
            if [ "$STATUS" != "401" ] && [ "$STATUS" != "400" ] && [ "$STATUS" != "405" ]; then
              echo "❌ ${ENDPOINT} should require auth, got $STATUS"
              exit 1
            fi
            echo "✅ ${ENDPOINT} → $STATUS (auth enforced)"
          done

      - name: Authenticated endpoints (with TEST_API_KEY)
        env:
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
        if: env.TEST_API_KEY != ''
        run: |
          # Tickers search
          RESPONSE=$(curl -s -H "Authorization: Bearer $TEST_API_KEY" \
            "https://riskmodels.app/api/tickers?search=AAPL")
          if ! echo "$RESPONSE" | grep -qi "AAPL"; then
            echo "❌ /api/tickers did not return AAPL"
            echo "$RESPONSE" | head -5
            exit 1
          fi
          echo "✅ /api/tickers search → AAPL found"

          # Balance — must be 200 with can_make_requests
          BAL=$(curl -s -H "Authorization: Bearer $TEST_API_KEY" \
            "https://riskmodels.app/api/balance")
          if ! echo "$BAL" | grep -q '"can_make_requests":true'; then
            echo "❌ /api/balance did not return can_make_requests:true"
            echo "$BAL" | head -3
            exit 1
          fi
          echo "✅ /api/balance → can_make_requests:true"

          # Free-tier status (any non-5xx is acceptable for a paid account)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TEST_API_KEY" \
            "https://riskmodels.app/api/auth/free-tier-status")
          if echo "$STATUS" | grep -q "^5"; then
            echo "❌ /api/auth/free-tier-status returned $STATUS"
            exit 1
          fi
          echo "✅ /api/auth/free-tier-status → $STATUS"

      - name: Notify on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 riskmodels.app smoke test failed',
              body: [
                '## Production Smoke Test Failure',
                '',
                `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `**Time:** ${new Date().toISOString()}`,
                '',
                'Check the workflow logs above for the failing endpoint.',
              ].join('\n'),
              labels: ['bug', 'api', 'automated'],
            });
