# Full coverage: set repo secret TEST_API_KEY (live API key) in GitHub → Settings → Secrets.
# If empty, the "Authenticated endpoints" step is skipped. See DEPLOYMENT.md → GitHub Actions.

name: Production Smoke Test

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  schedule:
    # Daily at 7 AM UTC, after overnight data refresh
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  smoke:
    name: riskmodels.app Health
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    # Job-level env so `if: env.TEST_API_KEY != ''` works (step-level env is not visible in that step's `if`).
    # See: https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsif
    env:
      TEST_API_KEY: ${{ secrets.TEST_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Build CLI
        working-directory: cli
        run: npm ci && npm run build

      - name: Health check (CLI — retries slow / 5xx deploys)
        working-directory: cli
        run: node dist/index.js health

      - name: OpenAPI spec accessible
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://riskmodels.app/openapi.json)
          if [ "$STATUS" != "200" ]; then
            echo "❌ /openapi.json returned $STATUS"
            exit 1
          fi
          echo "✅ /openapi.json → $STATUS"

      - name: Unauthenticated endpoints return 401
        run: |
          # /api/tickers is intentionally public (landing-page search) — excluded here
          for ENDPOINT in \
            "/api/estimate" \
            "/api/balance" \
            "/api/l3-decomposition" \
            "/api/metrics/AAPL"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://riskmodels.app${ENDPOINT}")
            if [ "$STATUS" != "401" ] && [ "$STATUS" != "400" ] && [ "$STATUS" != "405" ]; then
              echo "❌ ${ENDPOINT} should require auth, got $STATUS"
              exit 1
            fi
            echo "✅ ${ENDPOINT} → $STATUS (auth enforced)"
          done

      # Smoke runs on push immediately; Vercel often has not finished deploying the same commit yet.
      - name: Wait for Vercel deploy (push to main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Waiting 90s so riskmodels.app can serve the commit that triggered this workflow..."
          sleep 90

      - name: Authenticated endpoints (with TEST_API_KEY)
        if: ${{ env.TEST_API_KEY != '' }}
        run: |
          # Tickers search
          RESPONSE=$(curl -s -H "Authorization: Bearer $TEST_API_KEY" \
            "https://riskmodels.app/api/tickers?search=AAPL")
          if ! echo "$RESPONSE" | grep -qi "AAPL"; then
            echo "❌ /api/tickers did not return AAPL"
            echo "$RESPONSE" | head -5
            exit 1
          fi
          echo "✅ /api/tickers search → AAPL found"

          # Balance — must be 200 with can_make_requests
          BAL=$(curl -s -H "Authorization: Bearer $TEST_API_KEY" \
            "https://riskmodels.app/api/balance")
          if ! echo "$BAL" | grep -q '"can_make_requests":true'; then
            echo "❌ /api/balance did not return can_make_requests:true"
            echo "$BAL" | head -3
            exit 1
          fi
          echo "✅ /api/balance → can_make_requests:true"

          # Metrics — V3 JSON shape (ticker + metrics object with L3 keys)
          MET=$(curl -s -H "Authorization: Bearer $TEST_API_KEY" \
            "https://riskmodels.app/api/metrics/AAPL")
          echo "$MET" | python3 -c "import sys,json;d=json.load(sys.stdin);assert d.get('ticker'),d;assert isinstance(d.get('metrics'),dict),d;m=d['metrics'];assert any(k in m for k in ('l3_mkt_hr','l3_mkt_er','l3_sec_hr','l3_sub_hr','l3_res_er')),list(m.keys())"
          echo "✅ /api/metrics/AAPL → ticker + metrics (V3 keys)"

          # Ticker returns — data-plane check. Retries up to 5x because the zarr/security_history
          # slice has been observed flapping between full and empty on the same ticker within seconds
          # (see docs/CACHE_EMPTY_PAYLOAD_FIXES.md → "Operational follow-up"). Any non-empty attempt
          # passes; if all 5 are empty, we report every attempt's status + size + latency so the
          # failure log distinguishes a genuine outage from a transient.
          echo "--- /api/ticker-returns data-plane check (NVDA, up to 5 attempts)"
          TR_OK=0
          TR_LOG=""
          for i in 1 2 3 4 5; do
            METRICS=$(curl -sS -o /tmp/tr_resp.json \
              -w "http=%{http_code} bytes=%{size_download} t=%{time_total}" \
              -H "Authorization: Bearer $TEST_API_KEY" \
              "https://riskmodels.app/api/ticker-returns?ticker=NVDA&years=1&format=json")
            LEN=$(python3 -c "import json;d=json.load(open('/tmp/tr_resp.json'));print(len(d.get('data') or []))" 2>/dev/null || echo "0")
            TR_LOG="${TR_LOG}  attempt ${i}: ${METRICS} data_len=${LEN}"$'\n'
            if [ "$LEN" -gt 0 ]; then
              TR_OK=1
              echo "✅ /api/ticker-returns NVDA → data_len=${LEN} on attempt ${i}"
              break
            fi
            sleep 2
          done
          if [ "$TR_OK" -ne 1 ]; then
            echo "❌ /api/ticker-returns NVDA returned empty data on all 5 attempts:"
            echo "$TR_LOG"
            exit 1
          fi

          # Free-tier status (any non-5xx is acceptable for a paid account)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TEST_API_KEY" \
            "https://riskmodels.app/api/auth/free-tier-status")
          if echo "$STATUS" | grep -q "^5"; then
            echo "❌ /api/auth/free-tier-status returned $STATUS"
            exit 1
          fi
          echo "✅ /api/auth/free-tier-status → $STATUS"

      - name: Notify on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 riskmodels.app smoke test failed',
              body: [
                '## Production Smoke Test Failure',
                '',
                `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `**Time:** ${new Date().toISOString()}`,
                '',
                'Check the workflow logs above for the failing endpoint.',
              ].join('\n'),
            });
