name: Secret & Sensitive Content Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks — credential detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  proprietary-scan:
    name: Proprietary content guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Supabase project IDs in tracked files
        run: |
          echo "Scanning for Supabase project references..."
          if git ls-files -z | xargs -0 grep -l "plurbatnjhpullghyhol" 2>/dev/null; then
            echo "::error::Supabase project ID found in tracked files!"
            exit 1
          fi
          echo "✓ No Supabase project IDs found"

      - name: Check for pooler/connection strings
        run: |
          echo "Scanning for database connection strings..."
          if git ls-files -z | xargs -0 grep -lE "pooler\.supabase\.com|postgres://postgres\." 2>/dev/null; then
            echo "::error::Database connection string found in tracked files!"
            exit 1
          fi
          echo "✓ No connection strings found"

      - name: Check for pricing strategy docs
        run: |
          echo "Checking for proprietary strategy documents..."
          BLOCKED="PREMIUM_TIER_DESIGN.md PREMIUM_TIER_IMPLEMENTATION.md PRICING_STRATEGY_ANALYSIS.md"
          for f in $BLOCKED; do
            if git ls-files --error-unmatch "$f" 2>/dev/null; then
              echo "::error::Proprietary document '$f' is tracked in git!"
              exit 1
            fi
          done
          echo "✓ No proprietary strategy docs tracked"

      - name: Check for hardcoded API keys
        run: |
          echo "Scanning for hardcoded secrets patterns..."
          PATTERNS='(sk-[a-zA-Z0-9]{20,}|SUPABASE_SERVICE_ROLE_KEY\s*=\s*"?eyJ|password\s*=\s*"[^"]{8,})'
          if git ls-files -z | xargs -0 grep -lEn "$PATTERNS" --include="*.ts" --include="*.py" --include="*.tsx" --include="*.js" 2>/dev/null | grep -v ".env.example" | grep -v "node_modules"; then
            echo "::error::Possible hardcoded secret found!"
            exit 1
          fi
          echo "✓ No hardcoded secrets found"

      - name: Check supabase/.temp not tracked
        run: |
          if git ls-files supabase/.temp/ | grep -q .; then
            echo "::error::supabase/.temp/ directory is tracked in git!"
            exit 1
          fi
          echo "✓ supabase/.temp/ not tracked"
