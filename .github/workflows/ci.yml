name: CI

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  check:
    name: Lint, TypeCheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install & build CLI package
        working-directory: cli
        run: |
          npm ci
          npm run build

      - name: CLI smoke (help, version)
        run: |
          node cli/dist/index.js --help
          node cli/dist/index.js --version
          node cli/dist/index.js manifest --help

      - name: Parse OpenAPI YAML
        # Avoid ": " inside the shell string — YAML treats it as a mapping and breaks the workflow.
        run: node -e "const fs=require('fs'); const yaml=require('js-yaml'); yaml.load(fs.readFileSync('OPENAPI_SPEC.yaml','utf8')); console.log('OPENAPI_SPEC.yaml OK');"

      - name: TypeScript check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Sync from .env.local: ./scripts/sync-secrets-to-gh.sh
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.demo' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://riskmodels.app' }}

  sdk-tests:
    name: SDK (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: sdk/pyproject.toml

      - name: Install SDK & run tests
        working-directory: sdk
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
          python -m pytest

  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for sensitive data
        run: |
          echo "🔍 Checking for accidentally committed secrets..."
          if grep -rE "sk_live_[a-zA-Z0-9]{20,}" . --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.github 2>/dev/null; then
            echo "❌ Found Stripe live secret key"
            exit 1
          fi
          if grep -rE "sk_test_[a-zA-Z0-9]{20,}" . --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.github 2>/dev/null; then
            echo "❌ Found Stripe test secret key"
            exit 1
          fi
          if grep -rE "AKIA[0-9A-Z]{16}" . --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.github 2>/dev/null; then
            echo "❌ Found AWS access key"
            exit 1
          fi
          if grep -r "SUPABASE_SERVICE_ROLE_KEY=eyJ" . --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.github --exclude=.env.example 2>/dev/null; then
            echo "❌ Found Supabase service role key"
            exit 1
          fi
          if grep -rE "RISKMODELS_API_SERVICE_KEY=rm_service_[A-Za-z0-9_-]{12,}" . --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.github --exclude=.env.example 2>/dev/null; then
            echo "❌ Found RiskModels gateway service key (RISKMODELS_API_SERVICE_KEY)"
            exit 1
          fi
          echo "✅ No obvious secrets detected"

  public-safety:
    name: Public safety audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block committed user home paths
        run: |
          echo "🔍 Checking for absolute local paths..."
          if grep -rIq "/Users/" . \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=.github \
            --exclude-dir=.next; then
            echo "❌ Found /Users/... paths (do not commit machine-specific directories)"
            grep -rI "/Users/" . \
              --exclude-dir=node_modules \
              --exclude-dir=.git \
              --exclude-dir=.github \
              --exclude-dir=.next || true
            exit 1
          fi
          if grep -rIq "C:/Users/" . \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=.github \
            --exclude-dir=.next; then
            echo "❌ Found C:/Users/... style paths"
            grep -rI "C:/Users/" . \
              --exclude-dir=node_modules \
              --exclude-dir=.git \
              --exclude-dir=.github \
              --exclude-dir=.next || true
            exit 1
          fi
          echo "✅ No user-specific absolute paths detected"

      - name: Ensure sensitive env files are not tracked
        run: |
          echo "🔍 Checking tracked files for local/production env files..."
          TRACKED=$(git ls-files | grep -E '\.env\.(local|production)$' || true)
          if [ -n "$TRACKED" ]; then
            echo "❌ Sensitive environment files must not be tracked:"
            echo "$TRACKED"
            exit 1
          fi
          echo "✅ No .env.local / .env.production in git index"

      - name: Public docs must not reference localhost
        run: |
          if [ ! -d content/docs ]; then
            echo "✅ No content/docs directory — skipping"
            exit 0
          fi
          echo "🔍 Checking published docs for localhost URLs..."
          if grep -RIq "localhost:3000" content/docs; then
            echo "❌ Published docs should use production URLs, not localhost:3000"
            grep -RI "localhost:3000" content/docs || true
            exit 1
          fi
          echo "✅ No localhost:3000 in content/docs"
