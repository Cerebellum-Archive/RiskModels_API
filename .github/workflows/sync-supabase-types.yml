name: Sync Supabase Types
on:
  repository_dispatch:
    types: [schema_updated] # This matches the event sent by ERM3

permissions:
  contents: write

jobs:
  update-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Generate Types
        run: |
          mkdir -p types
          supabase gen types typescript --project-id "${{ secrets.SUPABASE_PROJECT_ID }}" > types/database.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update supabase types from schema change [skip ci]"
