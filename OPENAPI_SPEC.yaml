      summary: Correlation vs macro factors (query convenience)
      description: >
        Same computation as POST /correlation. Pass macro keys as a comma-separated `factors` query param
        (alias: `factor` is accepted as a synonym).
      operationId: getFactorCorrelationByTicker
      externalDocs:
        description: JSON Schema for the single-ticker success body (correlations, overlap_days, warnings, optional _metadata / _agent).
        url: https://riskmodels.app/schemas/factor-correlation-v1.json
      tags: [Risk Metrics]
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
          example: NVDA
        - name: factors
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated factor keys (bitcoin,gold,...); default all six. Same as query param `factor`.
        - name: return_type
          in: query
          required: false
          schema:
            type: string
            enum: [gross, l1, l2, l3_residual]
            default: l3_residual
        - name: window_days
          in: query
          required: false
          schema:
            type: integer
            minimum: 20
            maximum: 2000
            default: 252
        - name: method
          in: query
          required: false
          schema:
            type: string
            enum: [pearson, spearman]
