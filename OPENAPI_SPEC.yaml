openapi: 3.0.3
info:
  title: RiskModels API
  version: 3.0.0-agent
  description: >
    Precision equity risk intelligence platform with AI agent integration.

    Institutional-grade equity risk analysis for AI agents and quantitative applications.
    Provides daily factor hedge ratios, explained-risk decompositions, and portfolio-level
    risk attribution for ~3,000 US equities.


    **New in v3.0.0-agent:**

    - OAuth2 client credentials flow for machine-to-machine auth

    - Plaid Investments integration for live portfolio sync

    - MCP (Model Context Protocol) server for AI agent tools

    - Compliance manifests for AI marketplace integration

    - Per-key rate limiting and scoped access control


    **Data**: Universe `uni_mc_3000` (top ~3,000 US stocks by market cap), date range
    2006-01-04 to present, updated daily end-of-day. Backend: Zarr v2 on Google Cloud Storage,
    computed by the ERM3 regression system (Huber/Ridge). Supabase tables `erm3_betas` and
    `erm3_rankings` provide factor betas and ticker rankings for direct DB and API use.


    **Authentication Methods:**

    1. Session cookies (web app)

    2. API Key/Secret via Bearer token (external integrations)

    3. OAuth2 client credentials (AI agents, npm package)


    **Security Features:**

    - GCP KMS envelope encryption for portfolio data

    - Cryptographic shredding on key deletion

    - HMAC-SHA256 webhook verification

    - Row-level security (RLS) via Supabase


    **Pricing**: Per-request billing with prepaid balance. Cached responses are free.
    Many metered responses include `_agent.cost_usd` in the JSON body; others bill silently — always
    check the `X-API-Cost-USD` response header when present.

    **Lineage**: JSON data responses include `_metadata` (model version, data_as_of, factor set)
    and headers `X-Risk-Model-Version`, `X-Data-As-Of`, `X-Factor-Set-Id`, `X-Universe-Size`.
    Parquet and CSV bodies omit `_metadata`; use the same `X-Risk-*` headers on the HTTP response.

    **Tabular exports (Parquet / CSV):** For bulk historical loads, time-series endpoints accept
    `format=parquet` or `format=csv`, or (when `format` is omitted) `Accept: application/vnd.apache.parquet`
    or `Accept: text/csv`. Successful responses use `Content-Type: application/vnd.apache.parquet` or
    `text/csv; charset=utf-8` and `Content-Disposition: attachment` with a descriptive filename.
    Each export is a single flat table; column names and types match the per-operation schemas referenced
    in the response media type descriptions (aligned with JSON row objects or zipped parallel arrays).
    Parquet is produced via schema inference from the first row (UTF8 strings, DOUBLE floats, INT64 integers,
    BOOLEAN, TIMESTAMP_MILLIS for JavaScript Date values). CSV uses a header row, comma separators, UTF-8,
    and RFC 4180-style quoting when needed. Prefer Parquet for typed columnar stacks (pandas, Polars, Arrow);
    use CSV for spreadsheets and lightweight scripting.

  contact:
    name: RiskModels Support
    email: api-support@riskmodels.app
    url: https://riskmodels.app

  termsOfService: https://riskmodels.app/legal
  license:
    name: Commercial
    url: https://riskmodels.app/legal

servers:
  - url: https://riskmodels.app/api
    description: Production

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: rm_agent_{environment}_{random}_{checksum}
      description: >
        API key in format `rm_agent_{live|test}_{random}_{checksum}` or `rm_user_{random}_{checksum}`.
        Obtain via `POST /api/auth/provision` or from riskmodels.app/settings → API Keys.
        Include as: `Authorization: Bearer rm_agent_live_...`

    OAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://riskmodels.app/api/auth/token
          scopes:
            ticker-returns: Access ticker returns and historical data
            risk-decomposition: Access L3 risk decomposition
            batch-analysis: Perform portfolio batch analysis
            factor-correlation: Correlate stocks with macro factors (VIX, Bitcoin, Gold, etc.)
            macro-factor-series: Download daily macro factor return series (no ticker)
            chat-risk-analyst: Use AI risk analyst
            plaid:holdings: Access Plaid-synced portfolio holdings
            "*": Full API access

  parameters:
    FormatQueryTabular:
      name: format
      in: query
      required: false
      schema:
        type: string
        enum: [json, parquet, csv]
        default: json
      description: >
        Response carrier. `json` (default): structured payload for this operation (body includes
        `_metadata` where documented). `parquet` / `csv`: a single flat table of time-series rows only —
        lineage comes from `X-Risk-Model-Version`, `X-Data-As-Of`, `X-Factor-Set-Id`, `X-Universe-Size`.
        When this parameter is omitted, `Accept: application/vnd.apache.parquet` or `Accept: text/csv`
        selects the tabular format.

  schemas:
    AgentMeta:
      type: object
      description: Per-request billing and telemetry metadata appended to metered responses.
      properties:
        cost_usd:
          type: number
          format: float
          description: Cost deducted from prepaid balance for this request. 0 if served from cache.
          example: 0.005
        latency_ms:
          type: integer
          description: Server processing time in milliseconds.
          example: 145
        request_id:
          type: string
          description: Unique request identifier for support lookups.
          example: req_abc123xyz
        confidence:
          type: object
          properties:
            overall:
              type: number
              format: float
              minimum: 0
              maximum: 1
              example: 0.98
            factors:
              type: object
              additionalProperties:
                type: number
        data_freshness:
          type: string
          format: date-time
          description: ISO timestamp of the data's as-of datetime.
          example: "2026-02-21T10:30:00Z"
        billing_code:
          type: string
          description: Internal billing classification for this request type.
          example: ticker_returns_v2
        cache_status:
          type: string
          enum: [HIT, MISS, BYPASS]
          description: Whether this response was served from cache.

    RiskMetadata:
      type: object
      description: >
        Lineage and provenance metadata for all data responses.
        Included in response body as _metadata and as X-Risk-* headers.
      properties:
        model_version:
          type: string
          description: ERM3 model version (e.g. ERM3-L3-v30).
          example: "ERM3-L3-v30"
        data_as_of:
          type: string
          format: date
          description: Latest trading date in security_history.
          example: "2026-03-17"
        factor_set_id:
          type: string
          description: Factor set identifier.
          example: "SPY_uni_mc_3000"
        universe_size:
          type: integer
          description: Number of stocks in the universe.
          example: 2987
        wiki_uri:
          type: string
          format: uri
          description: Methodology documentation URL.
          example: "https://riskmodels.app/docs/methodology/erm3-l3"
        factors:
          type: array
          items:
            type: string
          description: L3 factor ETF tickers (market + 11 sectors).
          example:
            [
              "SPY",
              "XLK",
              "XLF",
              "XLV",
              "XLE",
              "XLI",
              "XLY",
              "XLP",
              "XLU",
              "XLB",
              "XLRE",
              "XLC",
            ]

    EstimateResponse:
      type: object
      description: Cost estimate for a request before it is made.
      required:
        - estimated_cost_usd
        - capability
        - pricing_model
        - note
      properties:
        estimated_cost_usd:
          type: number
          format: float
          example: 0.008
        estimated_tokens:
          type: integer
          example: 400
        estimated_rows:
          type: integer
          description: Estimated row count for time-series endpoints.
        estimated_bytes:
          type: integer
          description: Estimated response size in bytes.
        capability:
          type: string
          example: "ticker-returns"
        pricing_model:
          type: string
          enum: [per_request, per_position, per_token, subscription]
        unit_cost_usd:
          type: number
          format: float
        min_charge:
          type: number
          format: float
        note:
          type: string
          example: "Actual cost may vary. Cached responses are free."

    MetricsV3:
      type: object
      description: >
        V3 metric keys as returned inside `GET /metrics/{ticker}` under the `metrics` property.
        Suffixes: `_mkt` market, `_sec` sector, `_sub` subsector, `_res` residual.
        Hedge ratios (HR) are dollars of ETF to trade per $1 of stock; explained risk (ER) are variance fractions (0–1).
      properties:
        vol_23d:
          type: number
          format: float
          nullable: true
          description: Annualised realised volatility (23 trading days), decimal fraction.
        price_close:
          type: number
          format: float
          nullable: true
        market_cap:
          type: number
          format: float
          nullable: true
        stock_var:
          type: number
          format: float
          nullable: true
        l1_mkt_hr:
          type: number
          format: float
          nullable: true
        l1_mkt_er:
          type: number
          format: float
          nullable: true
        l1_res_er:
          type: number
          format: float
          nullable: true
        l2_mkt_hr:
          type: number
          format: float
          nullable: true
        l2_sec_hr:
          type: number
          format: float
          nullable: true
        l2_mkt_er:
          type: number
          format: float
          nullable: true
        l2_sec_er:
          type: number
          format: float
          nullable: true
        l2_res_er:
          type: number
          format: float
          nullable: true
        l3_mkt_hr:
          type: number
          format: float
          nullable: true
        l3_sec_hr:
          type: number
          format: float
          nullable: true
        l3_sub_hr:
          type: number
          format: float
          nullable: true
        l3_mkt_er:
          type: number
          format: float
          nullable: true
        l3_sec_er:
          type: number
          format: float
          nullable: true
        l3_sub_er:
          type: number
          format: float
          nullable: true
        l3_res_er:
          type: number
          format: float
          nullable: true
          description: Idiosyncratic variance fraction at L3.

    MetricsSnapshotResponse:
      type: object
      description: >
        Wire response for `GET /metrics/{ticker}`. Numeric fields live under `metrics`;
        `teo` is the observation date (V3 time-end).
      required:
        - symbol
        - ticker
        - teo
        - periodicity
        - metrics
        - display
        - meta
      properties:
        symbol:
          type: string
          description: Canonical symbol key in V3 registry.
        ticker:
          type: string
          example: NVDA
        teo:
          type: string
          format: date
          description: Latest observation date for the metrics row.
        periodicity:
          type: string
          example: daily
        metrics:
          $ref: "#/components/schemas/MetricsV3"
        display:
          type: object
          additionalProperties:
            type: string
          description: Optional display labels for metric keys (e.g. UI column titles).
        meta:
          type: object
          properties:
            sector_etf:
              type: string
              nullable: true
            asset_type:
              type: string
              nullable: true

    TickerReturnsDailyRow:
      type: object
      description: One trading day in `GET /ticker-returns` `data` array (V3 security_history fields).
      properties:
        date:
          type: string
          format: date
        returns_gross:
          type: number
          format: float
          nullable: true
          description: Daily gross return of the stock. Null when rolling-window metrics are unavailable (trailing data).
        price_close:
          type: number
          format: float
          nullable: true
          description: End-of-day price when available from history.
        l3_mkt_hr:
          type: number
          format: float
          nullable: true
          description: >
            Rolling L3 market hedge ratio (SPY notional per $1 stock). Null in trailing rows
            where the rolling regression window has insufficient data. May be negative
            (orthogonalization); negative market HR at L2/L3 is common.
        l3_sec_hr:
          type: number
          format: float
          nullable: true
          description: >
            Rolling L3 sector ETF hedge ratio (dollar_ratio). Null when the rolling window has
            insufficient data. May be negative due to orthogonalization (factor neutralization);
            not a sign error in the data.
        l3_sub_hr:
          type: number
          format: float
          nullable: true
          description: >
            Rolling L3 subsector ETF hedge ratio (dollar_ratio). Null when the rolling window has
            insufficient data. May be negative (orthogonalization or long subsector ETF leg); not a
            sign error in the data.
        l3_mkt_er:
          type: number
          format: float
          nullable: true
          description: >
            Market variance share at L3 (explained risk, 0–1). Null in trailing rows where the
            rolling window has insufficient data.
        l3_sec_er:
          type: number
          format: float
          nullable: true
          description: >
            Sector variance share at L3 (explained risk, 0–1). Null when the rolling window has
            insufficient data.
        l3_sub_er:
          type: number
          format: float
          nullable: true
          description: >
            Subsector variance share at L3 (explained risk, 0–1). Null when the rolling window has
            insufficient data.
        l3_res_er:
          type: number
          format: float
          nullable: true
          description: >
            Idiosyncratic (residual) variance share at L3 (0–1); SDK semantic name `l3_residual_er`.
            Null when the rolling window has insufficient data.

    GrossReturnDailyRow:
      type: object
      description: >
        One trading day in Parquet/CSV for `GET /returns` and `GET /etf-returns`: long table
        with the same fields as zipping JSON parallel arrays `dates` and `returns_gross` by index.
      properties:
        date:
          type: string
          format: date
        returns_gross:
          type: number
          format: float
          nullable: true
          description: Daily gross return (same series as JSON `returns_gross` array).

    BatchAnalyzeExportRow:
      type: object
      description: >
        One row in Parquet/CSV from `POST /batch/analyze` when `format` is `parquet` or `csv`.
        Emitted only for tickers that succeeded with `returns` data; tickers with errors are omitted.
      properties:
        ticker:
          type: string
        date:
          type: string
          format: date
        gross_return:
          type: number
          format: float
          nullable: true
          description: Daily gross return (JSON `returns.values` at the same index as `date`).
        l1:
          type: number
          format: float
          nullable: true
          description: Rolling L3 market HR history (`returns.l1` in JSON).
        l2:
          type: number
          format: float
          nullable: true
          description: Rolling L3 sector HR history (`returns.l2` in JSON).
        l3:
          type: number
          format: float
          nullable: true
          description: Rolling L3 subsector HR history (`returns.l3` in JSON).

    TickerReturnsResponseV3:
      type: object
      required:
        - symbol
        - ticker
        - periodicity
        - data
        - meta
      properties:
        symbol:
          type: string
        ticker:
          type: string
        periodicity:
          type: string
          example: daily
        data:
          type: array
          items:
            $ref: "#/components/schemas/TickerReturnsDailyRow"
        meta:
          $ref: "#/components/schemas/TickerReturnsMeta"

    TickerReturnsMeta:
      type: object
      properties:
        market_etf:
          type: string
          example: SPY
        sector_etf:
          type: string
          example: SOXX
        subsector_etf:
          type: string
          example: XSD
        universe:
          type: string
          example: US_EQUITY

    BatchHedgeRatios:
      type: object
      description: >
        Present when `metrics` includes `hedge_ratios`. Dollar HRs per $1 stock (same economics as
        `full_metrics` `*_hr` fields). Property names are **short** (`l1_market`, …); ERM3 zarr
        hedge-weight naming `L1_market_HR` … `L3_subsector_HR` maps row-wise to these keys — see
        docs/ERM3_ZARR_API_PARITY.md.
      properties:
        l1_market:
          type: number
          format: float
          nullable: true
          description: Zarr-style alias `L1_market_HR`; same as `full_metrics.l1_market_hr`.
        l2_market:
          type: number
          format: float
          nullable: true
          description: Zarr-style alias `L2_market_HR`; same as `full_metrics.l2_market_hr`.
        l2_sector:
          type: number
          format: float
          nullable: true
          description: Zarr-style alias `L2_sector_HR`; same as `full_metrics.l2_sector_hr`.
        l3_market:
          type: number
          format: float
          nullable: true
          description: Zarr-style alias `L3_market_HR`; same as `full_metrics.l3_market_hr`.
        l3_sector:
          type: number
          format: float
          nullable: true
          description: Zarr-style alias `L3_sector_HR`; same as `full_metrics.l3_sector_hr`.
        l3_subsector:
          type: number
          format: float
          nullable: true
          description: Zarr-style alias `L3_subsector_HR`; same as `full_metrics.l3_subsector_hr`.

    BatchReturnsPayload:
      type: object
      description: >
        Present when `metrics` includes `returns`. Arrays are parallel by index.
        Fields `l1`, `l2`, `l3` hold daily rolling hedge ratios from V3 (`l3_mkt_hr`, `l3_sec_hr`, `l3_sub_hr` history), not combined L1/L2/L3 model levels.
      properties:
        dates:
          type: array
          items:
            type: string
            format: date
        values:
          type: array
          items:
            type: number
          description: Daily gross returns (`returns_gross`).
        l1:
          type: array
          items:
            type: number
            nullable: true
        l2:
          type: array
          items:
            type: number
            nullable: true
        l3:
          type: array
          items:
            type: number
            nullable: true

    BatchFullMetrics:
      type: object
      description: >
        Present when `metrics` includes `full_metrics`. Flat snapshot for batch consumers: L1/L2/L3
        explained-risk and hedge-ratio fields when available from the backend (see
        docs/ERM3_ZARR_API_PARITY.md for zarr `L*_ER` / `L*_HR` mapping). Zarr topic-level
        `wmean_*` features are computed **client-side** as holdings-weighted means of these fields.
        Nulls mean missing or not modelled for that ticker — not omitted keys.
        Hedge ratios may be negative at any level (orthogonalization); negative **market** HR
        at L2 or L3 is especially common.
      properties:
        ticker:
          type: string
        date:
          type: string
          format: date
          nullable: true
          description: Observation date (`teo`) for the snapshot; align with `X-Data-As-Of` / `_metadata.data_as_of`.
        volatility:
          type: number
          format: float
          nullable: true
        l1_market_hr:
          type: number
          format: float
          nullable: true
          description: Zarr-style `L1_market_HR`; mirrors `hedge_ratios.l1_market`.
        l2_market_hr:
          type: number
          format: float
          nullable: true
          description: Zarr-style `L2_market_HR`; mirrors `hedge_ratios.l2_market`.
        l2_sector_hr:
          type: number
          format: float
          nullable: true
          description: Zarr-style `L2_sector_HR`; mirrors `hedge_ratios.l2_sector`.
        l3_market_hr:
          type: number
          format: float
          nullable: true
          description: Zarr-style `L3_market_HR`; mirrors `hedge_ratios.l3_market`.
        l3_sector_hr:
          type: number
          format: float
          nullable: true
          description: Zarr-style `L3_sector_HR`; mirrors `hedge_ratios.l3_sector`.
        l3_subsector_hr:
          type: number
          format: float
          nullable: true
          description: Zarr-style `L3_subsector_HR`; mirrors `hedge_ratios.l3_subsector`.
        l1_market_er:
          type: number
          format: float
          nullable: true
          description: Zarr-style `L1_market_ER`.
        l1_residual_er:
          type: number
          format: float
          nullable: true
          description: Zarr-style `L1_residual_ER`.
        l2_market_er:
          type: number
          format: float
          nullable: true
          description: Zarr-style `L2_market_ER`.
        l2_sector_er:
          type: number
          format: float
          nullable: true
          description: Zarr-style `L2_sector_ER`.
        l2_residual_er:
          type: number
          format: float
          nullable: true
          description: Zarr-style `L2_residual_ER`.
        l3_market_er:
          type: number
          format: float
          nullable: true
          description: Zarr-style `L3_market_ER`.
        l3_sector_er:
          type: number
          format: float
          nullable: true
          description: Zarr-style `L3_sector_ER`.
        l3_subsector_er:
          type: number
          format: float
          nullable: true
          description: Zarr-style `L3_subsector_ER`.
        l3_residual_er:
          type: number
          format: float
          nullable: true
          description: Zarr-style `L3_residual_ER`.
        market_cap:
          type: number
          format: float
          nullable: true
        close_price:
          type: number
          format: float
          nullable: true

    BatchAnalyzeTickerResult:
      type: object
      description: One entry in `POST /batch/analyze` `results` map (keyed by upper-case ticker).
      required:
        - ticker
        - status
      properties:
        ticker:
          type: string
        status:
          type: string
          enum: [success, error]
        error:
          type: string
          description: Present when status is `error`.
        returns:
          $ref: "#/components/schemas/BatchReturnsPayload"
        hedge_ratios:
          $ref: "#/components/schemas/BatchHedgeRatios"
        full_metrics:
          $ref: "#/components/schemas/BatchFullMetrics"
        meta:
          type: object
          nullable: true
          properties:
            market_etf:
              type: string
              example: SPY
            sector_etf:
              type: string
              nullable: true
            subsector_etf:
              type: string
              nullable: true

    BatchAnalyzeResponse:
      type: object
      required:
        - results
        - summary
        - _agent
      properties:
        results:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/BatchAnalyzeTickerResult"
        summary:
          type: object
          properties:
            total:
              type: integer
            success:
              type: integer
            errors:
              type: integer
        _agent:
          $ref: "#/components/schemas/AgentMeta"
        _metadata:
          $ref: "#/components/schemas/RiskMetadata"
          description: >
            Lineage for PIT tests: model version, as-of date, factor set, universe size. Also emitted
            as `X-Risk-Model-Version`, `X-Data-As-Of`, `X-Factor-Set-Id`, `X-Universe-Size` headers
            when the gateway attaches them.

    L3DecompositionResponse:
      type: object
      description: >
        Columnar L3 decomposition from V3 `security_history` (daily points; arrays are parallel by index).
        Field names use readable suffixes (`l3_market_er`, …). No `_agent` block in the current response body.
      required:
        - ticker
        - dates
        - l3_market_hr
        - l3_sector_hr
        - l3_subsector_hr
        - l3_market_er
        - l3_sector_er
        - l3_subsector_er
        - l3_residual_er
        - market_factor_etf
        - universe
        - data_source
      properties:
        ticker:
          type: string
        dates:
          type: array
          items:
            type: string
            format: date
        l3_market_hr:
          type: array
          items:
            type: number
            format: float
            nullable: true
        l3_sector_hr:
          type: array
          items:
            type: number
            format: float
            nullable: true
        l3_subsector_hr:
          type: array
          items:
            type: number
            format: float
            nullable: true
        l3_market_er:
          type: array
          items:
            type: number
            format: float
            nullable: true
        l3_sector_er:
          type: array
          items:
            type: number
            format: float
            nullable: true
        l3_subsector_er:
          type: array
          items:
            type: number
            format: float
            nullable: true
        l3_residual_er:
          type: array
          items:
            type: number
            format: float
            nullable: true
        market_factor_etf:
          type: string
        universe:
          type: string
        data_source:
          type: string
          example: security_history

    FactorCorrelationRequest:
      type: object
      required:
        - ticker
      properties:
        ticker:
          oneOf:
            - type: string
              example: NVDA
            - type: array
              items:
                type: string
              maxItems: 50
        factors:
          type: array
          items:
            type: string
          description: >
            Macro factor keys matching `macro_factors.factor_key` (lowercase: bitcoin, gold, oil, dxy, vix, ust10y2y).
            Server normalizes common aliases (e.g. btc → bitcoin). Defaults to all six when omitted.
        return_type:
          type: string
          enum: [gross, l1, l2, l3_residual]
          default: l3_residual
        window_days:
          type: integer
          minimum: 20
          maximum: 2000
          default: 252
        method:
          type: string
          enum: [pearson, spearman]
          default: pearson

    FactorCorrelationSingleResponse:
      allOf:
        - $ref: "#/components/schemas/FactorCorrelationResultBody"
        - type: object
          properties:
            _metadata:
              $ref: "#/components/schemas/RiskMetadata"
            _agent:
              type: object
              properties:
                latency_ms:
                  type: integer
                request_id:
                  type: string

    FactorCorrelationResponse:
      oneOf:
        - allOf:
            - $ref: "#/components/schemas/FactorCorrelationResultBody"
            - type: object
              properties:
                _metadata:
                  $ref: "#/components/schemas/RiskMetadata"
                _agent:
                  type: object
                  properties:
                    latency_ms:
                      type: integer
                    request_id:
                      type: string
        - type: object
          required:
            - results
          properties:
            results:
              type: array
              items:
                oneOf:
                  - $ref: "#/components/schemas/FactorCorrelationResultBody"
                  - type: object
                    required:
                      - ticker
                      - error
                      - status
                    properties:
                      ticker:
                        type: string
                      error:
                        type: string
                      status:
                        type: integer
            _metadata:
              $ref: "#/components/schemas/RiskMetadata"
            _agent:
              type: object
              properties:
                latency_ms:
                  type: integer
                request_id:
                  type: string

    FactorCorrelationResultBody:
      type: object
      required:
        - ticker
        - return_type
        - window_days
        - method
        - correlations
        - overlap_days
        - warnings
      properties:
        ticker:
          type: string
        return_type:
          type: string
          enum: [gross, l1, l2, l3_residual]
        window_days:
          type: integer
        method:
          type: string
          enum: [pearson, spearman]
        correlations:
          type: object
          additionalProperties:
            type: number
            nullable: true
        overlap_days:
          type: integer
          description: Largest number of paired observations used among requested factors.
        warnings:
          type: array
          items:
            type: string

    MacroFactorsSeriesRow:
      type: object
      required:
        - factor_key
        - teo
      properties:
        factor_key:
          type: string
          example: bitcoin
        teo:
          type: string
          format: date
        return_gross:
          type: number
          format: float
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          description: Present only when non-empty in `macro_factors.metadata`.

    MacroFactorsSeriesResponse:
      type: object
      required:
        - factors_requested
        - start
        - end
        - row_count
        - series
        - warnings
      properties:
        factors_requested:
          type: array
          items:
            type: string
        start:
          type: string
          format: date
        end:
          type: string
          format: date
        row_count:
          type: integer
        series:
          type: array
          items:
            $ref: "#/components/schemas/MacroFactorsSeriesRow"
        warnings:
          type: array
          items:
            type: string
        _metadata:
          $ref: "#/components/schemas/RiskMetadata"
        _agent:
          type: object
          properties:
            latency_ms:
              type: integer
            request_id:
              type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Machine-readable error code.
          example: TICKER_NOT_FOUND
        message:
          type: string
          description: Human-readable error description with suggested action.
          example: "Ticker 'XYZABC' not found in universe 'uni_mc_3000'. Check ticker spelling or try a different universe."
        code:
          type: integer
          description: HTTP status code.
          example: 404
        details:
          type: object
          properties:
            field:
              type: string
              example: ticker
            received:
              type: string
              example: XYZABC
            universe:
              type: string
              example: uni_mc_3000
            suggestion:
              type: string
              example: "Check for typos or use ticker search endpoint"

    OAuth2TokenRequest:
      type: object
      required:
        - grant_type
        - client_id
        - client_secret
      properties:
        grant_type:
          type: string
          enum: [client_credentials]
          description: Must be "client_credentials"
        client_id:
          type: string
          pattern: "^rm_(user|agent)_[a-z0-9_]{32,}$"
          example: rm_agent_live_abc123
          description: API key prefix (first segment)
        client_secret:
          type: string
          format: password
          example: rm_agent_live_abc123_xyz789_checksum
          description: Full API key
        scope:
          type: string
          example: "ticker-returns risk-decomposition"
          description: Space-separated list of requested scopes

    OAuth2TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          format: jwt
          description: JWT access token (use as Bearer token)
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          example: 900
          description: Token lifetime in seconds (900 = 15 minutes)
        scope:
          type: string
          description: Space-separated list of granted scopes

    OAuth2Error:
      type: object
      properties:
        error:
          type: string
          enum:
            - invalid_request
            - invalid_client
            - invalid_grant
            - unsupported_grant_type
            - server_error
        error_description:
          type: string

    PlaidHolding:
      type: object
      properties:
        account_id:
          type: string
        security_id:
          type: string
        institution_value:
          type: number
          description: Current value in USD
        quantity:
          type: number
        ticker:
          type: string
          description: Normalized ticker symbol
        name:
          type: string
          description: Security name
        risk_metrics:
          $ref: "#/components/schemas/RiskMetrics"

    RiskMetrics:
      type: object
      description: Optional risk enrichment on Plaid holdings; names may match batch `full_metrics` or V3 `metrics` keys depending on pipeline version.
      properties:
        annualized_volatility:
          type: number
          nullable: true
        volatility:
          type: number
          nullable: true
        sharpe_ratio:
          type: number
          nullable: true
        l3_mkt_hr:
          type: number
          nullable: true
        l3_sec_hr:
          type: number
          nullable: true
        l3_sub_hr:
          type: number
          nullable: true
        l3_res_er:
          type: number
          nullable: true
        l3_market_hr:
          type: number
          nullable: true
        l3_sector_hr:
          type: number
          nullable: true
        l3_subsector_hr:
          type: number
          nullable: true
        l3_residual_er:
          type: number
          nullable: true

    MCPTool:
      type: object
      description: >
        MCP tool descriptor as returned by `tools/list`. Tools are discoverable via
        `https://riskmodels.app/.well-known/mcp.json` or by connecting to the SSE
        endpoint at `https://riskmodels.app/api/mcp/sse` and calling `tools/list`.
      properties:
        name:
          type: string
          enum:
            - riskmodels_list_endpoints
            - riskmodels_get_capability
            - riskmodels_get_schema
            - analyze_portfolio
            - hedge_portfolio
            - get_risk_decomposition
          description: |
            Available tools:
            - `riskmodels_list_endpoints`: List all available API endpoints with summaries, tags, and costs. No required inputs.
            - `riskmodels_get_capability`: Get detailed schema and documentation for a specific capability by ID (e.g. "ticker-returns", "metrics", "l3-decomposition"). Input: `{ id: string }`.
            - `riskmodels_get_schema`: Fetch the JSON response schema for a given endpoint path. Input: `{ path: string }`.
            - `analyze_portfolio`: Analyze a portfolio of ticker positions — returns per-ticker risk metrics (volatility, Sharpe, hedge ratios, explained risk) and portfolio-level aggregates. Input: `{ positions: Array<{ ticker: string, weight?: number }> }`.
            - `hedge_portfolio`: Compute optimal hedge notionals for a portfolio using ERM3 factor model. Returns L1/L2/L3 hedge amounts in USD. Input: `{ positions: Array<{ ticker: string, notional_usd: number }>, level?: "l1"|"l2"|"l3" }`.
            - `get_risk_decomposition`: Get monthly L3 factor risk decomposition time series for a ticker. Input: `{ ticker: string, from?: string, to?: string }`.
        description:
          type: string
        inputSchema:
          type: object
          description: JSON Schema describing the tool's input parameters.
        outputSchema:
          type: object
          description: JSON Schema describing the tool's output structure.

    RankingMetricKeys:
      type: object
      description: >
        V3 security_history ranking metric keys (when rankings are exposed via API).
        Pattern: rank_ord_{window}_{cohort}_{metric}, cohort_size_{window}_{cohort}_{metric}.
        Windows: 1d, 21d, 63d, 252d. Cohorts: universe, sector, subsector.
        Metrics: mkt_cap, gross_return, sector_residual, subsector_residual, er_l1, er_l2, er_l3.
        rank_percentile computed client-side: (1 - (rank_ord - 1) / cohort_size) * 100.

    InsufficientBalance:
      type: object
      description: Returned when the account prepaid balance is exhausted (HTTP 402).
      properties:
        error:
          type: string
          enum: [INSUFFICIENT_BALANCE]
          example: INSUFFICIENT_BALANCE
        message:
          type: string
          example: "Insufficient balance. Current balance: $0.00. Top up at https://riskmodels.app/billing"
        balance_usd:
          type: number
          format: float
          example: 0.0
        top_up_url:
          type: string
          format: uri
          example: https://riskmodels.app/billing

    RateLimitExceeded:
      type: object
      description: Returned when the per-minute rate limit is exceeded (HTTP 429).
      properties:
        error:
          type: string
          enum: [RATE_LIMIT_EXCEEDED]
          example: RATE_LIMIT_EXCEEDED
        message:
          type: string
          example: "Rate limit exceeded. Retry after 2026-03-08T12:34:56Z"
        retry_after:
          type: string
          format: date-time
          description: ISO timestamp after which the client may retry.
          example: "2026-03-08T12:34:56Z"
        limit:
          type: integer
          description: Requests allowed per minute for this key.
          example: 60

security:
  - BearerAuth: []

paths:
  /auth/token:
    post:
      summary: Generate OAuth2 Access Token
      description: >
        OAuth 2.0 client credentials flow for machine-to-machine authentication.
        Exchange API credentials for a short-lived JWT token (15 minutes).


        **Use Cases:**

        - AI agents connecting to the API

        - Server-to-server integrations

        - npm package authentication

        - MCP client authentication
      operationId: generateOAuthToken
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuth2TokenRequest"
            example:
              grant_type: client_credentials
              client_id: rm_agent_live_abc123
              client_secret: rm_agent_live_abc123_xyz789_checksum
              scope: ticker-returns risk-decomposition
      responses:
        "200":
          description: Access token generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuth2TokenResponse"
              example:
                access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                token_type: Bearer
                expires_in: 900
                scope: ticker-returns risk-decomposition batch-analysis
        "400":
          description: Invalid request (missing or invalid grant_type)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuth2Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuth2Error"

  /mcp/sse:
    get:
      summary: MCP Server SSE Connection
      description: >
        Server-Sent Events endpoint for Model Context Protocol communication.
        Establishes a persistent connection for real-time MCP protocol messages.


        **Discovery:** The MCP server manifest is published at
        `https://riskmodels.app/.well-known/mcp.json` for automated client discovery.
        Clients should read that manifest to obtain the SSE URL, supported tools, and auth requirements.


        **Connection:**

        - Protocol: Server-Sent Events (SSE)

        - Authentication: Required (Bearer token)

        - Keep-alive: 30-second heartbeat


        **Usage:**

        ```javascript

        const eventSource = new EventSource('https://riskmodels.app/api/mcp/sse', {
          headers: { 'Authorization': 'Bearer rm_agent_...' }
        });

        ```
      operationId: mcpServerSSE
      tags:
        - MCP
      security:
        - BearerAuth: []
        - OAuth2ClientCredentials: ["*"]
      responses:
        "200":
          description: SSE connection established
          content:
            text/event-stream:
              schema:
                type: string
                format: event-stream
              example: |
                data: {"jsonrpc":"2.0","method":"notifications/initialized","params":{...}}

                data: {"jsonrpc":"2.0","method":"notifications/ping","params":{"timestamp":1234567890}}
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

    post:
      summary: MCP JSON-RPC Request
      description: >
        Send JSON-RPC 2.0 messages to the MCP server.


        **Available methods:**

        - `tools/list` - List available MCP tools

        - `tools/call` - Invoke an MCP tool

        - `resources/list` - List available resources

        - `resources/read` - Read a resource
      operationId: mcpServerRPC
      tags:
        - MCP
      security:
        - BearerAuth: []
        - OAuth2ClientCredentials: ["*"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - jsonrpc
                - method
                - id
              properties:
                jsonrpc:
                  type: string
                  enum: ["2.0"]
                method:
                  type: string
                  example: tools/call
                params:
                  type: object
                id:
                  oneOf:
                    - type: string
                    - type: integer
            example:
              jsonrpc: "2.0"
              method: tools/call
              params:
                name: riskmodels_get_capability
                arguments:
                  id: ticker-returns
              id: 1
      responses:
        "200":
          description: JSON-RPC response
          content:
            application/json:
              schema:
                type: object
                properties:
                  jsonrpc:
                    type: string
                    enum: ["2.0"]
                  result:
                    type: object
                  error:
                    type: object
                    properties:
                      code:
                        type: integer
                      message:
                        type: string
                  id:
                    oneOf:
                      - type: string
                      - type: integer
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /.well-known/ai-plugin.json:
    get:
      summary: OpenAI GPT Plugin Manifest
      description: >
        Plugin manifest for OpenAI GPT Store integration.
        Enables ChatGPT and other OpenAI models to discover and use the RiskModels API.
      operationId: getAIPluginManifest
      tags:
        - Compliance
        - Discovery
      security: []
      responses:
        "200":
          description: Plugin manifest
          content:
            application/json:
              schema:
                type: object
                properties:
                  schema_version:
                    type: string
                    example: v1
                  name_for_human:
                    type: string
                    example: RiskModels
                  name_for_model:
                    type: string
                    example: riskmodels
                  description_for_human:
                    type: string
                  description_for_model:
                    type: string
                  auth:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [service_http]
                      authorization_type:
                        type: string
                        enum: [bearer]
                  api:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [openapi]
                      url:
                        type: string
                        format: uri
                  logo_url:
                    type: string
                    format: uri
                  contact_email:
                    type: string
                    format: email

  /.well-known/agentic-disclosure.json:
    get:
      summary: Agentic Privacy Disclosure
      description: >
        Comprehensive data handling and privacy disclosure for AI marketplace compliance.
        Documents encryption, retention, third-party sharing, and regulatory compliance.


        **Key sections:**

        - Data handling (AES-256-GCM, GCP KMS)

        - Cryptographic shredding for GDPR compliance

        - Third-party sharing policy (none)

        - AI model usage (no training on user data)

        - Compliance (GDPR, SOC2, PCI-DSS)
      operationId: getAgenticDisclosure
      tags:
        - Compliance
        - Privacy
      security: []
      responses:
        "200":
          description: Privacy disclosure document
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: object
                  data_handling:
                    type: object
                  compliance:
                    type: object
                  security:
                    type: object
                  transparency:
                    type: object

  /.well-known/mcp.json:
    get:
      summary: MCP Server Manifest
      description: >
        Model Context Protocol server connection manifest.
        Enables AI model clients to discover and connect to the RiskModels MCP server.
      operationId: getMCPManifest
      tags:
        - MCP
        - Discovery
      security: []
      responses:
        "200":
          description: MCP server manifest
          content:
            application/json:
              schema:
                type: object
                properties:
                  mcpServers:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        name:
                          type: string
                        description:
                          type: string
                        url:
                          type: string
                          format: uri
                        transport:
                          type: string
                          enum: [sse, stdio]
                        auth:
                          type: object
                        capabilities:
                          type: object
                        tools:
                          type: array
                          items:
                            $ref: "#/components/schemas/MCPTool"

  /plaid/link-token:
    post:
      summary: Create Plaid Link token (Investments)
      description: >
        One-time `link_token` for Plaid Link in the browser. Requires an authenticated user.
        After Link succeeds, exchange the `public_token` via `POST /plaid/exchange-public-token`.
        **No per-request charge.**
      operationId: createPlaidLinkToken
      tags: [Plaid Integration]
      security:
        - BearerAuth: []
        - OAuth2ClientCredentials: [plaid:holdings]
      responses:
        "200":
          description: Link token for Plaid Link SDK.
          content:
            application/json:
              schema:
                type: object
                properties:
                  link_token:
                    type: string
                  expiration:
                    type: string
                    description: RFC-3339 datetime when the link_token expires.
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Plaid or configuration error.

  /plaid/exchange-public-token:
    post:
      summary: Exchange Plaid public token for stored item
      description: >
        Exchanges the short-lived `public_token` from Plaid Link for an access token, encrypted
        and stored server-side. Repeat connections create/update one row per Plaid `item_id`.
        **No per-request charge.**
      operationId: exchangePlaidPublicToken
      tags: [Plaid Integration]
      security:
        - BearerAuth: []
        - OAuth2ClientCredentials: [plaid:holdings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_token]
              properties:
                public_token:
                  type: string
                  description: From Plaid Link onSuccess.
      responses:
        "200":
          description: Item stored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  item_id:
                    type: string
                  request_id:
                    type: string
        "400":
          description: Missing or invalid body.
        "401":
          description: Unauthorized.
        "500":
          description: Plaid or storage error.

  /plaid/holdings:
    get:
      summary: Fetch Plaid-synced portfolio holdings
      description: >
        Returns enriched holdings from connected Plaid accounts with risk metrics.


        **Features:**

        - Automatic ticker resolution and normalization

        - Risk enrichment with factor exposures

        - Real-time portfolio valuation

        - Multi-account aggregation


        **Authentication:** Required (API Key or OAuth2 with plaid:holdings scope)

        **Billing:** $0.01 per request

        **Rate Limit:** 60 requests/minute
      operationId: getPlaidHoldings
      tags:
        - Plaid Integration
      security:
        - BearerAuth: []
        - OAuth2ClientCredentials: [plaid:holdings]
      responses:
        "200":
          description: Enriched holdings with risk metrics
          headers:
            X-API-Cost-USD:
              schema: { type: string }
            X-RateLimit-Limit:
              schema: { type: integer }
            X-RateLimit-Remaining:
              schema: { type: integer }
            X-RateLimit-Reset:
              schema: { type: integer }
          content:
            application/json:
              schema:
                type: object
                properties:
                  holdings:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlaidHolding"
                  accounts:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                    description: Plaid account objects from Investments Holdings (per connected item).
                  securities:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                    description: Plaid security objects referenced by holdings.
                  connections_count:
                    type: integer
                    description: Number of connected Plaid items for this user.
                  summary:
                    type: object
                    properties:
                      total_value:
                        type: number
                      account_count:
                        type: integer
                      position_count:
                        type: integer
                  _metadata:
                    type: object
                    additionalProperties: true
                  _agent:
                    $ref: "#/components/schemas/AgentMeta"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: API key missing `plaid:holdings` scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"
        "503":
          description: Plaid or token encryption not configured.

  /metrics/{ticker}:
    get:
      summary: Latest risk metrics snapshot
      description: >
        Returns the latest V3 daily metrics for the ticker. Numeric fields are under the
        `metrics` object using abbreviated keys (`l3_mkt_hr`, `l3_sec_hr`, `l3_sub_hr`,
        `l3_mkt_er`, `l3_res_er`, `vol_23d`, etc.). The observation date is `teo`.
        Optional `display` maps keys to human-readable labels.


        **Authentication:** Required (API Key or OAuth2)

        **Billing:** $0.005 per request (deducted from account balance)

        **Rate Limit:** 60 requests/minute (default)
      operationId: getMetrics
      tags: [Risk Metrics]
      security:
        - BearerAuth: []
        - OAuth2ClientCredentials: [ticker-returns]
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
          description: Ticker symbol (case-insensitive).
          example: NVDA
      responses:
        "200":
          description: Latest metrics snapshot.
          headers:
            X-API-Cost-USD:
              schema: { type: string }
              description: Cost deducted for this request (e.g. "0.005").
            X-Cache-Status:
              schema: { type: string, enum: [HIT, MISS, BYPASS] }
            X-Data-Freshness:
              schema: { type: string, format: date-time }
            X-RateLimit-Limit:
              schema: { type: integer }
              description: Request limit per minute
            X-RateLimit-Remaining:
              schema: { type: integer }
              description: Remaining requests in current window
            X-RateLimit-Reset:
              schema: { type: integer }
              description: Unix timestamp when limit resets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsSnapshotResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
