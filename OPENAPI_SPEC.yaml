            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /batch/analyze:
    post:
      summary: Multi-ticker batch analysis (25% discount)
      description: >
        Fetch data for up to 100 tickers in one JSON response (`results` map keyed by ticker).
        Supported `metrics` flags: `returns` (daily arrays with `l1`/`l2`/`l3` columns — see operation
        schema for semantics), `hedge_ratios` (latest six hedge ratios with **short** keys `l1_market`, …),
        `full_metrics` (flat L1/L2/L3 ER/HR snapshot with **long** keys `l1_market_hr`, `l1_market_er`, …).
        Request every block you need: `metrics` is a whitelist (no silent backfill). For ERM3 zarr parity
        (`L*_ER` / `L*_HR`), request `["full_metrics","hedge_ratios"]` and see docs/ERM3_ZARR_API_PARITY.md.
        The `l3_decomposition` flag is accepted but may be unpopulated depending on deployment. Cost:
        $0.002/position, minimum $0.01/call.

        **Parquet/CSV:** When `format` is `parquet` or `csv`, the response is a single long-format table
        of daily rows (`ticker`, `date`, `gross_return`, `l1`, `l2`, `l3`) per `#/components/schemas/BatchAnalyzeExportRow`.
        Only tickers with successful `returns` payloads are included; `full_metrics`, `hedge_ratios`, and
        `l3_decomposition` are not exported in tabular form. Ensure `metrics` includes `returns` or the
        table may be empty.
      operationId: batchAnalyze
      tags: [Risk Metrics]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tickers, metrics]
              properties:
                tickers:
                  type: array
                  items:
                    type: string
                  maxItems: 100
                  description: List of ticker symbols. Maximum 100.
                  example: ["AAPL", "MSFT", "NVDA", "GOOGL"]
                metrics:
                  type: array
                  items:
                    type: string
                    enum:
                      [returns, l3_decomposition, hedge_ratios, full_metrics]
                  description: Which payloads to include per ticker (`full_metrics` recommended for portfolio screens).
                  example: ["full_metrics"]
                years:
                  type: integer
                  minimum: 1
                  maximum: 15
                  default: 1
                  description: Number of years of history (applies to `returns` and `l3_decomposition`).
                format:
                  type: string
                  enum: [json, parquet, csv]
                  default: json
                  description: >
                    `json` (default): `BatchAnalyzeResponse` with `results`, `summary`, `_agent`, `_metadata`.
                    `parquet` / `csv`: long-format daily table only — see operation description and
                    `#/components/schemas/BatchAnalyzeExportRow`. Requires `returns` in `metrics` for non-empty data.
      responses:
        "200":
          description: >
            Batch results as JSON (`results` map) or as a single Parquet/CSV table of merged daily `returns`
            rows across tickers.
          headers:
            X-Risk-Model-Version:
              schema: { type: string }
              description: ERM3 model version (align with zarr slice / `_metadata.model_version`).
            X-Data-As-Of:
              schema: { type: string, format: date }
              description: Latest trading date for the batch snapshot.
            X-Factor-Set-Id:
              schema: { type: string }
              description: Factor set identifier (e.g. SPY_uni_mc_3000).
            X-Universe-Size:
              schema: { type: integer }
              description: Universe count for this model build.
            X-API-Cost-USD:
              schema: { type: string }
            X-Request-ID:
              schema: { type: string }
          content:
            application/vnd.apache.parquet:
              schema:
                type: string
                format: binary
              description: >
                Apache Parquet long table; columns per `#/components/schemas/BatchAnalyzeExportRow`.
                Tickers without `returns` data are omitted; failed tickers are omitted.
            text/csv:
              schema:
                type: string
              description: >
                UTF-8 CSV with header `ticker,date,gross_return,l1,l2,l3`; semantics match Parquet.
              example: |
                ticker,date,gross_return,l1,l2,l3
                AAPL,2025-03-20,0.005,0.92,0.15,0.04
                MSFT,2025-03-20,-0.002,0.88,0.11,0.03
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAnalyzeResponse"
        "400":
          description: Invalid request body or too many tickers (> 100).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /portfolio/risk-index:
    post:
      summary: Portfolio risk index (L3 variance decomposition)
      description: >
        Holdings-weighted L3 explained-risk decomposition (market, sector, subsector, residual),
        approximate portfolio volatility (weighted `vol_23d`), and optional daily time series of
        portfolio ER over `years`. Partial resolution: unresolved tickers appear in `errors`;
        computation uses resolved positions only. Metered; includes `_agent` and `_metadata`.
      operationId: postPortfolioRiskIndex
      tags: [Risk Metrics]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [positions]
              properties:
                positions:
                  type: array
                  maxItems: 100
                  items:
                    type: object
                    required: [ticker, weight]
                    properties:
                      ticker:
                        type: string
                      weight:
                        type: number
                        format: float
                        exclusiveMinimum: 0
                        description: Fractional weights (normalized server-side) or dollar notionals.
                  description: >
                    May be empty when holdings are not yet available (e.g. Plaid initial sync). In that case the API returns HTTP 200 with `status: "syncing"` and a message instead of portfolio aggregates.
                timeSeries:
                  type: boolean
                  default: false
                  description: When true, include `time_series` of daily portfolio ER.
                years:
                  type: integer
                  minimum: 1
                  maximum: 15
                  default: 1
                  description: History span when `timeSeries` is true.
      responses:
        "200":
          description: >-
            Portfolio aggregates, per-ticker breakdown, optional time series; or status "syncing" when
            positions is empty (Plaid / holdings not ready).
          headers:
            X-API-Cost-USD:
              schema: { type: string }
            X-Data-Fetch-Latency-Ms:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [syncing]
                    description: Present only when `positions` was empty (holdings not ready).
                  message:
                    type: string
                    description: Human-readable hint when status is syncing.
                  portfolio_risk_index:
                    type: object
                    properties:
                      variance_decomposition:
                        type: object
                        properties:
                          market: { type: number, nullable: true }
                          sector: { type: number, nullable: true }
                          subsector: { type: number, nullable: true }
                          residual: { type: number, nullable: true }
                          systematic: { type: number, nullable: true }
                      portfolio_volatility_23d: { type: number, nullable: true }
                      position_count: { type: integer }
                  per_ticker:
                    type: object
                    additionalProperties: true
                  summary:
                    type: object
                    properties:
                      total_positions: { type: integer }
                      resolved: { type: integer }
                      errors: { type: integer }
                  time_series:
                    type: array
                    items:
                      type: object
                      properties:
                        date: { type: string, format: date }
                        market_er: { type: number }
                        sector_er: { type: number }
                        subsector_er: { type: number }
                        residual_er: { type: number }
                        systematic_er: { type: number }
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        ticker: { type: string }
                        error: { type: string }
                  _agent:
                    $ref: "#/components/schemas/AgentMeta"
                  _metadata:
                    type: object
                    additionalProperties: true
        "400":
          description: Invalid body or no resolvable tickers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /webhooks/subscribe:
    get:
      summary: List webhook subscriptions
      description: Returns active webhook subscriptions for the authenticated user (secrets omitted).
      operationId: listWebhookSubscriptions
      tags: [Webhooks]
      responses:
        "200":
          description: Subscription list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscriptions:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        url: { type: string, format: uri }
                        events:
                          type: array
                          items: { type: string, enum: [batch.completed] }
                        active: { type: boolean }
                        created_at: { type: string, format: date-time }
                        updated_at: { type: string, format: date-time }
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error.
    post:
      summary: Create webhook subscription
      description: >
        Register an HTTPS URL for outbound events (e.g. `batch.completed`). The `secret` is returned
        once in the response; store it to verify `X-RiskModels-Signature` (HMAC-SHA256).
      operationId: createWebhookSubscription
      tags: [Webhooks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url:
                  type: string
                  format: uri
                  maxLength: 2048
                  description: Must use https://
                events:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    enum: [batch.completed]
                active:
                  type: boolean
                  default: true
                secret:
                  type: string
                  minLength: 24
                  maxLength: 512
                  description: Optional custom secret; otherwise server-generated.
      responses:
        "201":
          description: Created; `secret` included in body for verification.
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscription:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      url: { type: string, format: uri }
                      events:
                        type: array
                        items: { type: string }
                      active: { type: boolean }
                      created_at: { type: string, format: date-time }
                      secret: { type: string }
        "400":
          description: Invalid URL or body.
        "401":
          description: Unauthorized.
        "500":
          description: Server error.
    delete:
      summary: Delete webhook subscription
      description: Remove a subscription by id (`?id=` query parameter).
      operationId: deleteWebhookSubscription
      tags: [Webhooks]
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
        "400":
          description: Missing id.
        "401":
          description: Unauthorized.
        "404":
          description: Subscription not found.

  /tickers:
    get:
      summary: Ticker universe search
      description: >
        List tickers in the universe or search by name/symbol. Free endpoint (no charge).
        Use the `mag7` flag to retrieve the MAG7 tickers. Use `include_metadata` for
        sector and ETF assignment per ticker.
      operationId: getTickers
      tags: [Utility]
      security: []
      parameters:
        - name: array
          in: query
          required: false
          schema:
            type: string
            enum: [ticker, teo]
          description: "`ticker` returns all ticker symbols. `teo` returns valid trading dates."
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search string matched against ticker symbol or company name.
          example: NVDA
        - name: mag7
          in: query
          required: false
          schema:
            type: boolean
          description: Return only MAG7 tickers (AAPL, MSFT, NVDA, GOOGL, AMZN, META, TSLA).
        - name: include_metadata
          in: query
          required: false
          schema:
            type: boolean
          description: Include sector, sector ETF, and subsector ETF per ticker.
      responses:
        "200":
          description: Ticker list or search results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tickers:
                    type: array
                    items:
                      type: string
                    example: ["AAPL", "MSFT", "NVDA"]
                  metadata:
                    type: object
                    nullable: true
                    additionalProperties:
                      type: object
                      properties:
                        name:
                          type: string
                        sector:
                          type: string
                        sector_etf:
                          type: string
                        subsector_etf:
                          type: string

  /estimate:
    post:
      summary: Estimate request cost
      description: >
        Returns predicted cost before a request is made. Free to call, requires authentication.
        Used by AI agents for pre-flight cost checks.
      operationId: estimateCost
      tags:
        - Billing
      security:
        - BearerAuth: []
        - OAuth2ClientCredentials: ["*"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoint]
              properties:
                endpoint:
                  type: string
                  example: "ticker-returns"
                  description: Target endpoint (ticker-returns, batch-analyze, l3-decomposition, etc.)
                params:
                  type: object
                  description: Same params as the target endpoint
                  example: { ticker: "AAPL", years: 5 }
      responses:
        "200":
          description: Cost estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateResponse"
        "400":
          description: Unknown endpoint or invalid request
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /health:
    get:
      summary: Service health check
      description: >
        Returns current service status, version, capability availability (from recent billing_events),
        latest-session gross-return coverage (EODHD completeness signal), and optional macro_factors
        freshness for macro factor APIs (see macro_factors in the response). Free, no auth required.
      operationId: getHealth
      tags: [Utility]
      security: []
      responses:
        "200":
          description: Service is up.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded, down]
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    example: 3.0.0-agent
                  services:
                    type: object
                    additionalProperties: true
                  capabilities:
                    type: object
                    additionalProperties: true
                  teo_coverage:
                    type: object
                    description: Coverage of returns_gross at the newest teo in security_history vs stock universe; sparse values suggest EODHD not yet published for that session (10% threshold, same as ERM3 T check).
                    properties:
                      latest_teo:
                        type: string
                        format: date
                        nullable: true
                      universe_stock_count:
                        type: integer
                      non_null_returns_symbol_count:
                        type: integer
                      latest_teo_coverage_pct:
                        type: number
                        nullable: true
                        description: Percent 0–100 of universe with non-null gross return at latest_teo.
                      eodhd_latest_session_pending:
                        type: boolean
                      query_error:
                        type: string
                  macro_factors:
                    type: object
                    nullable: true
                    description: >
                      Daily macro factor return series freshness in Supabase macro_factors (POST /correlation,
                      GET /metrics/{ticker}/correlation, GET /macro-factors). Omitted or partial if the table is empty or the query fails.
                    properties:
                      status:
                        type: string
                        enum: [healthy, stale, unavailable]
                      latest_teos:
                        type: object
                        additionalProperties:
                          type: string
                          nullable: true
                        description: Most recent teo observed per factor_key (e.g. bitcoin, vix).
                      row_count_last_7d:
                        type: integer
                      newest_teo:
                        type: string
                        format: date
                        nullable: true
                      oldest_teo:
                        type: string
                        format: date
                        nullable: true
                      stale:
                        type: boolean
                        description: True when newest_teo is older than roughly three trading days.

  /balance:
    get:
      summary: Account balance and rate limits
      description: Returns current prepaid balance, account status, and rate-limit settings for the authenticated token.
      operationId: getBalance
      tags: [Account]
      responses:
        "200":
          description: Account balance and status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                    example: user@example.com
                  balance_usd:
                    type: number
                    format: float
                    example: 24.85
                  currency:
                    type: string
                    example: USD
                  account_type:
                    type: string
                    example: pay_as_you_go
                  status:
                    type: object
                    properties:
                      account:
                        type: string
                        example: active
                      billing:
                        type: string
                        example: ok
                      can_make_requests:
                        type: boolean
                  limits:
                    type: object
                    properties:
                      rate_limit_per_minute:
                        type: integer
                        example: 60
                      daily_request_limit:
                        type: integer
                        nullable: true
                  last_updated:
                    type: string
                    format: date-time
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"
    patch:
      summary: Update auto-refill settings
      description: >
        Updates prepaid auto-refill on `agent_accounts`. When `enabled` is true, `refill_amount_usd`
        (20, 50, or 100) and `min_threshold_tokens` (maps to USD threshold between $5 and $50) are required.
      operationId: patchBalanceAutoRefill
      tags: [Account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
                  description: Enable or disable auto top-up.
                refill_amount_usd:
                  type: number
                  enum: [20, 50, 100]
                  description: Required when enabling auto-refill.
                min_threshold_tokens:
                  type: number
                  description: >
                    Token threshold; converted to USD for storage. Implied USD must be between 5 and 50
                    when enabling.
      responses:
        "200":
          description: Updated settings or current state.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Validation error.
        "401":
          description: Unauthorized.
        "500":
          description: Server error.

  /user/billing-config:
    get:
      summary: Auto-refill billing preferences
      description: >
        Current auto-refill flags and amounts from `agent_accounts`. Same semantics as portal settings;
        use `PATCH /balance` for the alternate auto-refill field names (`enabled`, `refill_amount_usd`).
      operationId: getUserBillingConfig
      tags: [Account]
      responses:
        "200":
          description: Billing preferences.
          content:
            application/json:
              schema:
                type: object
                properties:
                  auto_top_up: { type: boolean }
                  auto_top_up_amount: { type: number }
                  auto_top_up_threshold: { type: number }
                  has_payment_method: { type: boolean }
                  allowed_refill_amounts:
                    type: array
                    items: { type: number }
                  threshold_bounds:
                    type: object
                    properties:
                      min: { type: number }
                      max: { type: number }
        "401":
          description: Unauthorized.
        "404":
          description: Agent account not found.
        "500":
          description: Server error.
    patch:
      summary: Update auto-refill billing preferences
      description: >
        Partial update of `auto_top_up`, `auto_top_up_amount` (must be 20, 50, or 100), and/or
        `auto_top_up_threshold` (USD, 5–50). Requires a saved payment method to enable auto-refill.
      operationId: patchUserBillingConfig
      tags: [Account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                auto_top_up: { type: boolean }
                auto_top_up_amount:
                  type: number
                  enum: [20, 50, 100]
                auto_top_up_threshold:
                  type: number
                  minimum: 5
                  maximum: 50
      responses:
        "200":
          description: Updated fields.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  auto_top_up: { type: boolean }
                  auto_top_up_amount: { type: number }
                  auto_top_up_threshold: { type: number }
        "400":
          description: Validation or missing payment method.
        "401":
          description: Unauthorized.
        "500":
          description: Server error.

  /invoices:
    get:
      summary: Invoice history and spend summary
      description: Returns paginated invoice history and a summary of spend by period (month/quarter/year).
      operationId: getInvoices
      tags: [Account]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Maximum number of invoices to return.
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [month, quarter, year]
            default: month
          description: Aggregation period for spend summary.
      responses:
        "200":
          description: Invoice list and spend summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoices:
                    type: array
                    items:
                      type: object
                      properties:
                        status:
                          type: string
                        amount_usd:
                          type: number
                          format: float
                  summary:
                    type: object
                    properties:
                      period:
                        type: string
                      total_invoices:
                        type: integer
                      total_spent_usd:
                        type: number
                        format: float
                      total_requests:
                        type: integer
                      current_period_cost_usd:
                        type: number
                        format: float
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /auth/provision:
    post:
      summary: Provision an API key
      description: >
        Exchange a valid session JWT for a long-lived Bearer API key in format
        `rm_agent_{live|test}_{random}_{checksum}`. Intended for AI agents that need
        a stable key for repeated calls.
      operationId: provisionToken
      tags: [Authentication]
      responses:
        "200":
          description: New API key provisioned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_key:
                    type: string
                    example: rm_agent_live_a1b2c3d4_xyz789
                  environment:
                    type: string
                    enum: [live, test]
                  created_at:
                    type: string
                    format: date-time
        "401":
          description: Missing or invalid session JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/provision-free:
    post:
      summary: Provision a free-tier API key
      description: >
        Generate a free API key with limited daily usage (100 req/day, 10 req/min).
        No payment or email required. Returns the key once — store it immediately.
      operationId: provisionFreeToken
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_name]
              properties:
                agent_name:
                  type: string
                  minLength: 3
                  description: Display name for the free-tier agent (≥ 3 characters).
                  example: my-research-bot
                purpose:
                  type: string
                  description: Optional description of intended use.
                  default: development
      responses:
        "201":
          description: Free API key created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    type: object
                    properties:
                      user_id: { type: string }
                      agent_name: { type: string }
                      tier: { type: string, enum: [free] }
                      limits:
                        type: object
                        properties:
                          queries_per_day: { type: integer, example: 100 }
                          queries_per_minute: { type: integer, example: 10 }
                  credentials:
                    type: object
                    properties:
                      api_key:
                        type: string
                        description: Shown only once. Store securely.
                        example: rm_agent_live_abc123_xyz
                      prefix: { type: string }
        "400":
          description: Invalid agent_name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/free-tier-status:
    get:
      summary: Free-tier usage status
      description: >
        Returns current daily usage and remaining quota for a free-tier API key.
        Authenticated with Bearer token. Returns HTTP 200 with `tier` field for
        non-free accounts.
      operationId: getFreeTierStatus
      tags: [Authentication]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Free-tier usage status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tier: { type: string, example: free }
                  user_id: { type: string }
                  usage:
                    type: object
                    properties:
                      queries_today: { type: integer }
                      queries_this_month: { type: integer }
                      remaining_today: { type: integer }
                  limits:
                    type: object
                    properties:
                      queries_per_day: { type: integer, example: 100 }
                      queries_per_minute: { type: integer, example: 10 }
                  reset_date: { type: string, format: date-time }
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No account found for this API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cli/query:
    post:
      summary: Raw SQL query (SELECT only)
      description: >
        Execute a read-only SQL SELECT against the RiskModels database. Only SELECT
        statements are permitted; DML and DDL are rejected. Results capped at 10,000
        rows. Billed as `cli-query` capability. Requires valid Bearer token with
        billing balance.
      operationId: cliQuery
      tags: [Utility]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sql]
              properties:
                sql:
                  type: string
                  description: SELECT statement to execute. Multi-statement and DML/DDL are rejected.
                  example: SELECT ticker, symbol FROM symbols LIMIT 10
                limit:
                  type: integer
                  description: Max rows to return if no LIMIT clause in sql (default 100, max 10000).
                  default: 100
      responses:
        "200":
          description: Query results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items: { type: object }
                  count: { type: integer }
                  sql:
                    {
                      type: string,
                      description: Executed SQL (may have LIMIT appended).,
                    }
        "400":
          description: Invalid or disallowed SQL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"

  /telemetry:
    get:
      summary: Telemetry metrics
      description: >
        Performance and reliability metrics for API capabilities. Optional filter by
        capability and number of days. Cost: $0.002/call.
      operationId: getTelemetry
      tags: [Utility]
      parameters:
        - name: capability
          in: query
          required: false
          schema:
            type: string
          description: Specific capability id to get metrics for.
        - name: days
          in: query
          required: false
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 90
          description: Number of days of historical data.
      responses:
        "200":
          description: Telemetry metrics for the requested period.
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /chat:
    post:
      summary: AI Risk Analyst
      description: >
        Natural language risk analysis via conversational AI (GPT-4). Request body
        includes messages array and optional model (default gpt-4o-mini). Billed per token.
      operationId: postChat
      tags: [Risk Metrics]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    required: [role, content]
                    properties:
                      role: { type: string, enum: [user, assistant] }
                      content: { type: string }
                model:
                  type: string
                  description: AI model to use (default gpt-4o-mini)
                response_mode:
                  type: string
                  enum: [markdown, catalog, hybrid]
                  description: Reserved for future streaming / A2UI modes; non-streaming JSON today.
      responses:
        "200":
          description: Assistant reply, token usage (when provided by the model), and lineage metadata.
          headers:
            X-API-Cost-USD:
              schema: { type: string }
            X-Data-Fetch-Latency-Ms:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    required: [role, content]
                    properties:
                      role:
                        type: string
                        enum: [assistant]
                      content:
                        type: string
                  model:
                    type: string
                  usage:
                    type: object
                    nullable: true
                    properties:
                      prompt_tokens: { type: integer }
                      completion_tokens: { type: integer }
                      total_tokens: { type: integer }
                  _metadata:
                    type: object
                    additionalProperties: true
                  _agent:
                    $ref: "#/components/schemas/AgentMeta"
        "400":
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"
        "502":
          description: Upstream AI provider error.
        "503":
          description: Chat not configured (e.g. missing OPENAI_API_KEY).

tags:
  - name: Risk Metrics
    description: ERM3 factor hedge ratios, explained risk, and return decompositions.
  - name: Utility
    description: Ticker search, health, and service discovery.
  - name: Account
    description: Balance, billing, and invoice management.
  - name: Webhooks
    description: Outbound webhook subscriptions (e.g. batch completion).
  - name: Authentication
    description: API key provisioning and OAuth2 token management.
  - name: MCP
    description: Model Context Protocol server endpoints for AI agents.
  - name: Plaid Integration
    description: Live portfolio synchronization via Plaid Investments API.
  - name: Compliance
    description: AI marketplace compliance and discovery manifests.
  - name: Privacy
    description: Data handling and privacy disclosure.
  - name: Discovery
    description: Service discovery and capability manifests.
