  /macro-factors:
    get:
      summary: Macro factor daily return series
      description: >
        Returns long-format rows from Supabase `macro_factors` (`factor_key`, `teo`, `return_gross`) for the
        requested date range. No stock ticker is required. Omit `factors` to use all six canonical keys
        (bitcoin, gold, oil, dxy, vix, ust10y2y); aliases such as `btc` normalize to `bitcoin`.
        Default date range: from five calendar years before `end` through `end` (UTC date); default `end` is today.
        Maximum span: 20 years. Cost: $0.001 per request.
        JSON Schema (MCP): https://riskmodels.app/schemas/macro-factors-series-v1.json
      operationId: getMacroFactorSeries
      externalDocs:
        description: JSON Schema for GET /macro-factors 200 response body.
        url: https://riskmodels.app/schemas/macro-factors-series-v1.json
      tags: [Risk Metrics]
      security:
        - BearerAuth: []
        - OAuth2ClientCredentials: [macro-factor-series]
      parameters:
        - name: factors
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated factor keys; synonym query param `factor` is also accepted by the server.
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Inclusive start (YYYY-MM-DD).
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Inclusive end (YYYY-MM-DD). Defaults to today (UTC).
      responses:
        "200":
          description: Macro factor rows and lineage metadata.
          headers:
            X-API-Cost-USD:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MacroFactorsSeriesResponse"
        "400":
          description: Invalid query (date range, factors, or span).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "429":
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /rankings/{ticker}:
    get:
      summary: Cross-sectional rankings snapshot
      description: >
        Latest V3 cross-sectional ranks from `security_history` for the ticker’s symbol.
        Optional query filters narrow to one metric, cohort, and/or window; omit them for the full grid.
        See `#/components/schemas/RankingMetricKeys` for key patterns. `rank_percentile` is 100 = best.
      operationId: getRankingsByTicker
      tags: [Risk Metrics]
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
          example: AAPL
        - name: metric
          in: query
          required: false
          schema:
            type: string
            enum:
              - mkt_cap
              - gross_return
              - sector_residual
              - subsector_residual
              - er_l1
              - er_l2
              - er_l3
        - name: cohort
          in: query
          required: false
          schema:
            type: string
            enum: [universe, sector, subsector]
        - name: window
          in: query
          required: false
          schema:
            type: string
            enum: [1d, 21d, 63d, 252d]
      responses:
        "200":
          description: Rankings and lineage metadata.
          headers:
            X-API-Cost-USD:
              schema: { type: string }
            X-Data-Fetch-Latency-Ms:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticker: { type: string }
                  symbol: { type: string }
                  teo:
                    type: string
                    format: date
                    nullable: true
                  rankings:
                    type: array
                    items:
                      type: object
                      properties:
                        metric: { type: string }
                        cohort: { type: string }
                        window: { type: string }
                        rank_ordinal:
                          type: integer
                          nullable: true
                        cohort_size:
                          type: integer
                          nullable: true
                        rank_percentile:
                          type: number
                          nullable: true
                  filters:
                    type: object
                    properties:
                      metric: { type: string, nullable: true }
                      cohort: { type: string, nullable: true }
                      window: { type: string, nullable: true }
                  _metadata:
                    type: object
                    additionalProperties: true
                  _agent:
                    $ref: "#/components/schemas/AgentMeta"
        "400":
          description: Invalid query parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "404":
          description: Ticker not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /rankings/{ticker}/badge:
    get:
      summary: Shields.io-style rank badge (JSON)
      description: >
        Public JSON for [Shields Endpoint badges](https://shields.io/badges/endpoint-badge).
        No API key by default; optional shared secret via env `RANKINGS_BADGE_TOKEN` and query `token=`.
        Defaults: metric=subsector_residual, cohort=subsector, window=252d. `rank_percentile` 100 = best.
        Cached at the edge; per-IP rate limit when Upstash Redis is configured (`RANKINGS_BADGE_IP_RPM`, default 120).
      operationId: getRankingsBadge
      tags: [Risk Metrics]
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
          example: AAPL
        - name: token
          in: query
          required: false
          schema:
            type: string
          description: Required when server sets RANKINGS_BADGE_TOKEN.
        - name: metric
          in: query
          required: false
          schema:
            type: string
            enum:
              - mkt_cap
              - gross_return
              - sector_residual
              - subsector_residual
              - er_l1
              - er_l2
              - er_l3
            default: subsector_residual
        - name: cohort
          in: query
          required: false
          schema:
            type: string
            enum: [universe, sector, subsector]
            default: subsector
        - name: window
          in: query
          required: false
          schema:
            type: string
            enum: [1d, 21d, 63d, 252d]
            default: 252d
      responses:
        "200":
          description: Shields endpoint JSON (schemaVersion 1).
          headers:
            Cache-Control:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                required: [schemaVersion]
                properties:
                  schemaVersion: { type: integer, enum: [1] }
                  label: { type: string }
                  message: { type: string }
                  color: { type: string }
                  isError: { type: boolean }
        "400":
          description: Invalid ticker or query parameter.
        "401":
          description: Missing or invalid token when RANKINGS_BADGE_TOKEN is set.
        "404":
          description: Ticker or ranking row not found.

