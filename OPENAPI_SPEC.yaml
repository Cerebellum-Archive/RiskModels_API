  /correlation:
    post:
      summary: Correlation vs macro factor returns
      description: >
        Computes Pearson or Spearman correlation between a stock return series and daily macro factor
        returns stored in `macro_factors` (e.g. bitcoin, vix). Stock series may be gross returns or
        ERM3 residual returns (L1/L2/L3) using the replication identity with SPY and sector/subsector ETFs.
        Request body accepts a single ticker or an array for batch (`results` array). Cost: $0.002 per ticker.
        Factor strings are normalized to lowercase canonical keys matching `macro_factors.factor_key` (aliases such as btc → bitcoin).
        JSON Schema (MCP / validation): request body https://riskmodels.app/schemas/factor-correlation-request-v1.json ;
        single-ticker 200 body https://riskmodels.app/schemas/factor-correlation-v1.json .
      operationId: postFactorCorrelation
      externalDocs:
        description: JSON Schema for POST /correlation request body (MCP validate before call).
        url: https://riskmodels.app/schemas/factor-correlation-request-v1.json
      tags: [Risk Metrics]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FactorCorrelationRequest"
      responses:
        "200":
          description: Correlations per macro factor (null when insufficient overlap or missing data).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FactorCorrelationResponse"
        "400":
          description: Invalid body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientBalance"
        "404":
          description: Ticker not found or insufficient history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"

  /metrics/{ticker}/correlation:
