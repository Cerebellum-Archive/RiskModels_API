            use a long table `#/components/schemas/GrossReturnDailyRow` (`date`, `returns_gross` per row).
          headers:
            X-Risk-Model-Version:
              schema: { type: string }
            X-Data-As-Of:
              schema: { type: string, format: date }
            X-Factor-Set-Id:
              schema: { type: string }
            X-Universe-Size:
              schema: { type: integer }
          content:
