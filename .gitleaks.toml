# Gitleaks config — custom rules for RiskModels API
# https://github.com/gitleaks/gitleaks

title = "RiskModels Gitleaks Config"

# Extend the default ruleset
[extend]
useDefault = true

# Custom rules for our specific patterns
[[rules]]
id = "supabase-project-id"
description = "Supabase project reference ID"
regex = '''plurbat[a-z]{10,}'''
tags = ["supabase", "infrastructure"]

[[rules]]
id = "supabase-pooler-url"
description = "Supabase pooler connection string"
regex = '''pooler\.supabase\.com'''
tags = ["database", "connection-string"]

[[rules]]
id = "riskmodels-api-key"
description = "RiskModels API key"
regex = '''rm_(agent|user)_[a-z]+_[A-Za-z0-9]{16,}'''
tags = ["api-key"]

# Allow known safe patterns
[allowlist]
paths = [
  '''.env.example''',
  '''AUTHENTICATION_GUIDE.md''',
  '''node_modules/''',
  '''.gitleaks.toml''',
  '''.github/workflows/''',
  '''sdk/tests/''',
  '''tests/''',
  '''scripts/''',
  '''content/docs/''',
  '''mcp/data/openapi.json''',
  '''public/openapi.json''',
  '''OPENAPI_SPEC.yaml''',
  '''docs/''',
]
